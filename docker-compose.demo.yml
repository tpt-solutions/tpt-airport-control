services:
  # PostgreSQL Database - Preconfigured
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flight_control
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: flight_pass_2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./database/demo_schema.sql:/docker-entrypoint-initdb.d/03_demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_user -d flight_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flight_control
      DB_USER: flight_user
      DB_PASS: flight_pass_2025

  # Frontend Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # WebSocket Server
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: php websocket-server.php
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: