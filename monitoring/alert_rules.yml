groups:
  - name: flight_control_alerts
    rules:
      # System Health Alerts
      - alert: FlightControlDown
        expr: up{job="flight-control-backend"} == 0
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Flight Control Backend is down"
          description: "Flight Control Backend has been down for more than 5 minutes."

      - alert: FlightControlFrontendDown
        expr: up{job="flight-control-frontend"} == 0
        for: 5m
        labels:
          severity: critical
          service: frontend
        annotations:
          summary: "Flight Control Frontend is down"
          description: "Flight Control Frontend has been down for more than 5 minutes."

      # Database Alerts
      - alert: DatabaseDown
        expr: up{job="flight-control-postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL Database is down"
          description: "PostgreSQL Database has been down for more than 2 minutes."

      - alert: DatabaseHighConnections
        expr: pg_stat_activity_count{datname="flight_control"} > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connections"
          description: "Database has more than 80 active connections for 5 minutes."

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="flight-control-redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis Cache is down"
          description: "Redis Cache has been down for more than 2 minutes."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 90% for 5 minutes."

      # API Performance Alerts
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="flight-control-backend"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High API response time"
          description: "95th percentile of API response time is above 2 seconds for 5 minutes."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5..", job="flight-control-backend"}[5m]) / rate(http_requests_total{job="flight-control-backend"}[5m]) * 100 > 5
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High error rate"
          description: "Error rate is above 5% for 5 minutes."

      # ADS-B Integration Alerts
      - alert: ADSBDataStale
        expr: (time() - adsb_last_update_timestamp) > 300
        for: 5m
        labels:
          severity: warning
          service: adsb
        annotations:
          summary: "ADS-B data is stale"
          description: "ADS-B data has not been updated for more than 5 minutes."

      - alert: ADSBLowSignal
        expr: adsb_signal_strength < 0.5
        for: 10m
        labels:
          severity: warning
          service: adsb
        annotations:
          summary: "Low ADS-B signal strength"
          description: "ADS-B signal strength is below 50% for 10 minutes."

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 90% for 5 minutes."

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90% for 5 minutes."

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% for 5 minutes."

      # Network Alerts
      - alert: HighNetworkTraffic
        expr: rate(node_network_receive_bytes_total[5m]) > 100000000
        for: 5m
        labels:
          severity: warning
          service: network
        annotations:
          summary: "High network traffic"
          description: "Network receive rate is above 100MB/s for 5 minutes."

      # Flight Control Specific Alerts
      - alert: FlightConflictDetected
        expr: flight_conflicts_total > 0
        for: 1m
        labels:
          severity: critical
          service: atc
        annotations:
          summary: "Flight conflict detected"
          description: "A flight conflict has been detected and requires immediate attention."

      - alert: WeatherAlertActive
        expr: weather_alerts_active > 0
        for: 2m
        labels:
          severity: warning
          service: weather
        annotations:
          summary: "Active weather alerts"
          description: "There are active weather alerts affecting flight operations."

      - alert: SecurityIncident
        expr: security_incidents_total > 0
        for: 1m
        labels:
          severity: critical
          service: security
        annotations:
          summary: "Security incident detected"
          description: "A security incident has been detected and requires investigation."

      # Container Health Alerts
      - alert: ContainerRestarting
        expr: increase(container_restart_count[5m]) > 0
        for: 1m
        labels:
          severity: warning
          service: containers
        annotations:
          summary: "Container restarting"
          description: "A container has restarted unexpectedly."

      - alert: ContainerUnhealthy
        expr: container_health_status == 0
        for: 3m
        labels:
          severity: critical
          service: containers
        annotations:
          summary: "Container unhealthy"
          description: "A container is reporting unhealthy status."

      # Log Monitoring Alerts
      - alert: HighErrorLogRate
        expr: rate(log_messages_total{level="error"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: logging
        annotations:
          summary: "High error log rate"
          description: "Error log rate is above 10 messages per minute for 5 minutes."

      - alert: FailedLoginAttempts
        expr: rate(failed_login_attempts_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          service: authentication
        annotations:
          summary: "High failed login attempts"
          description: "Failed login attempts rate is above 5 per minute for 5 minutes."
